keyword_search:
  name: nptu-association-search
  session_url: https://www.nptu.edu.tw/app/index.php?Plugin=asso
  bootstrap_url: https://www.nptu.edu.tw/app/index.php?Action=mobileloadmod&Type=mobilesch&Nbr=0
  bootstrap_method: post
  url: https://www.nptu.edu.tw/app/index.php?Plugin=asso&Action=assosearch
  search_types:
    - part
    - com
  max_items: 20
  unit: 國立屏東大學
  category: 關鍵字搜尋
  site_search:
    enabled: true
    name: nptu-domain-search
    seed_urls:
      - https://www.nptu.edu.tw/
    allowed_hosts:
      - nptu.edu.tw
    max_pages: 40
    max_items: 20
    max_candidate_urls: 80
    max_depth: 3
    max_pages_per_host: 30
    request_timeout_seconds: 15
    query_timeout_seconds: 25
    max_response_bytes: 2097152
    embedding_batch_size: 32
    cache_ttl_seconds: 300
    relevance_threshold: 0.18
    high_confidence_score: 0.50
    failure_warning_margin: 0.05
    early_stop_min_results: 4
    database_min_score: 0.58
    database_min_results: 2
    database_min_content_chars: 160
    weights:
      phrase: 0.16
      title: 0.14
      heading: 0.10
      anchor: 0.10
      url: 0.05
      body: 0.08
      lexical: 0.13
      semantic: 0.16
      parent: 0.10
      discovery: 0.05
      depth_penalty: 0.03
    unit: 國立屏東大學
    category: NPTU 網域搜尋
  aliases:
    計網中心: 計算機與網路中心
    職推處: 職涯發展暨教育推廣處
